name: Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: aas-ctl-linux-amd64
          - goos: windows
            goarch: amd64
            asset_name: aas-ctl-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            asset_name: aas-ctl-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: aas-ctl-darwin-arm64
          - goos: linux
            goarch: arm64
            asset_name: aas-ctl-linux-arm64
          - goos: linux
            goarch: arm
            goarm: 7
            asset_name: aas-ctl-linux-armv7

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.asset_name }} .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
